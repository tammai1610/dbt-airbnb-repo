version: 2

sources:
  - name: airbnb
    schema: raw
    tables: 
      - name: listings
        identifier: raw_listings
      
      - name: hosts
        identifier: raw_hosts
      
      - name: reviews
        identifier: raw_reviews
        config:
          loaded_at_field: date
          freshness:
            warn_after: {count: 1, period: hour} # warn if data is older than 1 hour
            error_after: {count: 24, period: hour} # error if data is older than 24 hours
